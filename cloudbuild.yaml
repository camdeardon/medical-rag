steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/medical-rag:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medical-rag:$COMMIT_SHA']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medical-rag'
      - '--image'
      - 'gcr.io/$PROJECT_ID/medical-rag:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Note: To persist SQLite data across container restarts, 
      # you must mount a Cloud Storage bucket using Cloud Run Volume Mounts (FUSE)
      # Or change app/database.py to use Cloud SQL (PostgreSQL).

images:
  - 'gcr.io/$PROJECT_ID/medical-rag:$COMMIT_SHA'
